<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mikeclaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    header .status {
      font-size: 12px;
      color: #666;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #d0e8ff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1a1a2e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .msg.error {
      align-self: flex-start;
      background: #2e1a1a;
      color: #ff9090;
    }
    .msg .meta {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
    }
    .thinking {
      align-self: flex-start;
      color: #666;
      font-style: italic;
      padding: 8px 16px;
    }
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }
    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 200px;
    }
    #input:focus { border-color: #4a8cca; }
    #send {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #1a3a5c;
      color: #d0e8ff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    #send:hover { background: #245080; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>mikeclaw</h1>
    <span class="status" id="status">ready</span>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');

    function addMessage(text, role, meta) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      // Use textContent to prevent XSS
      div.textContent = text;
      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addThinking() {
      const div = document.createElement('div');
      div.className = 'thinking';
      div.id = 'thinking';
      div.textContent = 'Thinking...';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      status.textContent = 'thinking...';
      addThinking();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        removeThinking();
        const data = await res.json();

        if (!res.ok) {
          addMessage(data.error || 'Request failed', 'error');
        } else {
          const meta = data.cost
            ? `$${data.cost.toFixed(4)} | ${(data.durationMs / 1000).toFixed(1)}s`
            : data.durationMs
              ? `${(data.durationMs / 1000).toFixed(1)}s`
              : '';
          addMessage(data.result, 'assistant', meta);
        }
      } catch (err) {
        removeThinking();
        addMessage(`Network error: ${err.message}`, 'error');
      } finally {
        sendBtn.disabled = false;
        status.textContent = 'ready';
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    input.focus();
  </script>
</body>
</html>
